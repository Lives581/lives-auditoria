<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Avances Auditoría — LIVES</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0f172a; --surface:#1e293b; --border:#334155;
  --text:#e2e8f0; --muted:#64748b;
  --green:#2a9d8f; --red:#e63946; --yellow:#e9c46a;
}

html,body{ width:100%; overflow-x:hidden; }
body{ font-family:'Barlow',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* HEADER */
.header{ background:var(--surface); border-bottom:1px solid var(--border); padding:16px 20px; display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:50; }
.logo-badge{ background:var(--green); color:#fff; font-weight:700; font-size:16px; padding:6px 14px; border-radius:6px; letter-spacing:1px; flex-shrink:0; }
.header-title{ font-size:16px; font-weight:600; color:var(--muted); }

/* RESUMEN */
.resumen{ display:flex; gap:8px; padding:14px 16px; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
.resumen::-webkit-scrollbar{ display:none; }
.res-chip{ background:var(--surface); border-radius:10px; padding:12px 16px; text-align:center; flex-shrink:0; min-width:75px; }
.res-num{ font-size:22px; font-weight:700; }
.res-lbl{ font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-top:3px; }

/* MAIN */
.main{ padding:16px 16px 120px; max-width:800px; margin:0 auto; }

/* CARD */
.card{ background:var(--surface); border-radius:14px; padding:22px; margin-bottom:16px; }
.card-title{ font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:1.2px; margin-bottom:18px; }

/* FIELDS — 1 col mobile, 2 col desktop */
.field-grid{ display:flex; flex-direction:column; gap:18px; }
@media(min-width:640px){ .field-grid{ display:grid; grid-template-columns:1fr 1fr; gap:16px; } }

.field{ display:flex; flex-direction:column; gap:8px; }
.field label{ font-size:13px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.8px; }

.ac-wrap{ position:relative; }
.ac-input{
  background:var(--bg); border:2px solid var(--border); border-radius:12px;
  color:var(--text); font-family:'Barlow',sans-serif;
  font-size:16px; padding:15px 16px; width:100%;
  transition:border-color 0.2s; -webkit-appearance:none;
}
.ac-input:focus{ outline:none; border-color:var(--green); }
.ac-input:disabled{ opacity:0.3; cursor:not-allowed; }

.ac-list{
  position:absolute; top:calc(100% + 5px); left:0; right:0;
  background:var(--surface); border:2px solid var(--green);
  border-radius:12px; max-height:250px; overflow-y:auto;
  z-index:200; display:none;
  box-shadow:0 8px 32px rgba(0,0,0,0.6);
  -webkit-overflow-scrolling:touch;
}
.ac-list.open{ display:block; }
.ac-item{ padding:14px 16px; cursor:pointer; font-size:16px; border-bottom:1px solid #ffffff08; transition:background 0.1s; }
.ac-item:last-child{ border-bottom:none; }
.ac-item:hover,.ac-item:active{ background:#2a9d8f22; color:var(--green); }

/* REGISTRO */
.registro-card{ background:var(--surface); border-radius:14px; padding:22px; margin-bottom:16px; border-top:4px solid var(--green); display:none; }
.registro-card.visible{ display:block; }

.datos-grid{ display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:22px; }
@media(min-width:640px){ .datos-grid{ grid-template-columns:repeat(3,1fr); } }

.dato{ display:flex; flex-direction:column; gap:4px; }
.dato-label{ font-size:11px; font-weight:700; color:#475569; text-transform:uppercase; letter-spacing:0.8px; }
.dato-valor{ font-size:16px; font-weight:600; color:var(--text); word-break:break-word; }

/* STATUS */
.status-section{ margin-bottom:18px; }
.status-label{ font-size:13px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:12px; }
.status-btns{ display:flex; gap:10px; flex-wrap:wrap; }
.btn-s{ flex:1; min-width:90px; padding:16px 8px; border:2px solid transparent; border-radius:12px; font-family:'Barlow',sans-serif; font-size:15px; font-weight:700; cursor:pointer; transition:all 0.18s; text-transform:uppercase; -webkit-tap-highlight-color:transparent; }
.btn-apr { background:#2a9d8f22; color:#2a9d8f; border-color:#2a9d8f44; }
.btn-rech{ background:#e6394622; color:#e63946; border-color:#e6394644; }
.btn-pend{ background:#e9c46a22; color:#e9c46a; border-color:#e9c46a44; }
.btn-apr:hover,.btn-apr.on  { background:#2a9d8f; color:#fff; border-color:#2a9d8f; }
.btn-rech:hover,.btn-rech.on{ background:#e63946; color:#fff; border-color:#e63946; }
.btn-pend:hover,.btn-pend.on{ background:#e9c46a; color:#0f172a; border-color:#e9c46a; }

.btn-guardar{ width:100%; padding:17px; background:var(--green); color:#fff; border:none; border-radius:12px; font-family:'Barlow',sans-serif; font-size:17px; font-weight:700; cursor:pointer; transition:background 0.2s; text-transform:uppercase; -webkit-tap-highlight-color:transparent; }
.btn-guardar:hover{ background:#21867a; }
.btn-guardar:disabled{ background:var(--border); cursor:not-allowed; color:var(--muted); }

/* LOADING */
.loading{ text-align:center; padding:40px; color:var(--muted); font-size:15px; }
.loading-dot{ display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--green); animation:pulse 1.2s ease-in-out infinite; margin:0 3px; }
.loading-dot:nth-child(2){ animation-delay:0.2s; }
.loading-dot:nth-child(3){ animation-delay:0.4s; }
@keyframes pulse{ 0%,80%,100%{ opacity:0.3; transform:scale(0.8); } 40%{ opacity:1; transform:scale(1.2); } }

/* TOAST */
.toast{ position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(120px); background:var(--green); color:#fff; padding:15px 28px; border-radius:12px; font-weight:700; font-size:15px; transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1); z-index:999; white-space:nowrap; box-shadow:0 4px 24px rgba(0,0,0,0.5); }
.toast.error{ background:var(--red); }
.toast.show{ transform:translateX(-50%) translateY(0); }

.spinner{ display:inline-block; width:14px; height:14px; border:2px solid #ffffff44; border-top-color:#fff; border-radius:50%; animation:spin 0.6s linear infinite; vertical-align:middle; margin-right:7px; }
@keyframes spin{ to{ transform:rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <span class="logo-badge">LIVES</span>
  <span class="header-title">Avances — Auditoría</span>
</div>

<div class="resumen" id="resumen" style="display:none">
  <div class="res-chip"><div class="res-num" style="color:#94a3b8" id="cnt-tot">—</div><div class="res-lbl">Total</div></div>
  <div class="res-chip"><div class="res-num" style="color:#2a9d8f" id="cnt-apr">—</div><div class="res-lbl">Aprob.</div></div>
  <div class="res-chip"><div class="res-num" style="color:#e63946" id="cnt-rech">—</div><div class="res-lbl">Recház.</div></div>
  <div class="res-chip"><div class="res-num" style="color:#e9c46a" id="cnt-pend">—</div><div class="res-lbl">Pend.</div></div>
  <div class="res-chip"><div class="res-num" style="color:#94a3b8" id="cnt-sin">—</div><div class="res-lbl">Sin status</div></div>
</div>

<div class="main">

  <div class="card">
    <div class="card-title">Buscar registro</div>
    <div id="loading-search" class="loading"><span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span><br><br>Cargando datos...</div>
    <div class="field-grid" id="field-grid" style="display:none">
      <div class="field"><label>Grupo</label><div class="ac-wrap"><input id="inp-grupo" class="ac-input" type="text" placeholder="Escribe para buscar..." autocomplete="off" autocorrect="off" autocapitalize="off"><div class="ac-list" id="list-grupo"></div></div></div>
      <div class="field"><label>Estilo</label><div class="ac-wrap"><input id="inp-estilo" class="ac-input" type="text" placeholder="Primero selecciona Grupo" autocomplete="off" autocorrect="off" autocapitalize="off" disabled><div class="ac-list" id="list-estilo"></div></div></div>
      <div class="field"><label>PO</label><div class="ac-wrap"><input id="inp-po" class="ac-input" type="text" placeholder="Primero selecciona Estilo" autocomplete="off" autocorrect="off" autocapitalize="off" disabled><div class="ac-list" id="list-po"></div></div></div>
      <div class="field"><label>Color</label><div class="ac-wrap"><input id="inp-color" class="ac-input" type="text" placeholder="Primero selecciona PO" autocomplete="off" autocorrect="off" autocapitalize="off" disabled><div class="ac-list" id="list-color"></div></div></div>
    </div>
  </div>

  <div class="registro-card" id="registro-card">
    <div class="card-title">Registro encontrado</div>
    <div class="datos-grid" id="datos-grid"></div>
    <div class="status-section">
      <div class="status-label">Asignar Status</div>
      <div class="status-btns">
        <button class="btn-s btn-apr"  onclick="selStatus('APROBADO')">✓ Aprobado</button>
        <button class="btn-s btn-rech" onclick="selStatus('RECHAZADO')">✗ Rechazado</button>
        <button class="btn-s btn-pend" onclick="selStatus('PENDIENTE')">⏳ Pendiente</button>
      </div>
    </div>
    <button class="btn-guardar" id="btn-guardar" onclick="guardar()" disabled>Guardar Status</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIGURACIÓN ─────────────────────────────────────────────
const SHEET_ID   = '1BT-8jGWpT6ENHgsnCBX_Ybb9rbHfUr9kearKNsvu8E4';
const SHEET_NAME = 'Avances Auditoria SEM-025';
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby-ZCzYEK9Y-N95TVjbWSMer4rxdxWoZCx8l1rhHln36QbywiCR-pIux3tyTIq8SoP3/exec'; // ← se llenará en el paso siguiente

// Columnas (0-based)
const COL = { FECHA:0, SEMANA:1, GRUPO:2, ESTILO:3, PO:4, COLOR:5, CANT:6, PORC:7, STATUS:8 };
const STATUS_OPTS = ['APROBADO','RECHAZADO','PENDIENTE'];

// ── ESTADO ────────────────────────────────────────────────────
let DATOS = [];
let st = {grupo:null,estilo:null,po:null,color:null};
let registro = null, statusSel = null;
let opts = {grupos:[],estilos:[],pos:[],colores:[]};

// ── CARGA INICIAL ─────────────────────────────────────────────
async function cargarDatos() {
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
    const res  = await fetch(url);
    const text = await res.text();
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);/)[1]);
    const rows = json.table.rows;

    DATOS = rows.map((row, i) => {
      const c = row.c;
      const val = (idx) => (c[idx] && c[idx].v !== null && c[idx].v !== undefined) ? String(c[idx].v).trim() : '';
      return {
        rowIndex: i + 2,
        fecha:      val(COL.FECHA),
        semana:     val(COL.SEMANA),
        grupo:      val(COL.GRUPO),
        estilo:     val(COL.ESTILO),
        po:         val(COL.PO),
        color:      val(COL.COLOR),
        cantidad:   val(COL.CANT),
        porcentaje: val(COL.PORC),
        status:     val(COL.STATUS),
      };
    }).filter(r => r.grupo || r.estilo);

    // Mostrar campos
    document.getElementById('loading-search').style.display = 'none';
    document.getElementById('field-grid').style.display = '';

    // Calcular resumen
    let apr=0,rech=0,pend=0,sin=0;
    DATOS.forEach(r => {
      const s = (r.status||'').toUpperCase();
      if(s==='APROBADO') apr++;
      else if(s==='RECHAZADO') rech++;
      else if(s==='PENDIENTE') pend++;
      else sin++;
    });
    document.getElementById('cnt-tot').textContent  = DATOS.length;
    document.getElementById('cnt-apr').textContent  = apr;
    document.getElementById('cnt-rech').textContent = rech;
    document.getElementById('cnt-pend').textContent = pend;
    document.getElementById('cnt-sin').textContent  = sin;
    document.getElementById('resumen').style.display = 'flex';

    // Cargar grupos
    opts.grupos = [...new Set(DATOS.map(r=>r.grupo).filter(Boolean))].sort();

  } catch(e) {
    document.getElementById('loading-search').innerHTML = '⚠ Error cargando datos. Verifica que el Sheets sea público.';
    console.error(e);
  }
}

// ── AUTOCOMPLETE ──────────────────────────────────────────────
function setupAC(inpId, listId, getOpts, onSel) {
  const inp  = document.getElementById(inpId);
  const list = document.getElementById(listId);
  inp.addEventListener('input', () => {
    const q = inp.value.toLowerCase();
    const f = getOpts().filter(o => o.toLowerCase().includes(q));
    renderList(list, f, val => { inp.value=val; list.classList.remove('open'); onSel(val); });
    list.classList.toggle('open', f.length > 0 && inp.value !== '');
  });
  inp.addEventListener('focus', () => {
    const o = getOpts(); if(!o.length) return;
    const q = inp.value.toLowerCase();
    const f = q ? o.filter(x => x.toLowerCase().includes(q)) : o;
    renderList(list, f, val => { inp.value=val; list.classList.remove('open'); onSel(val); });
    if(f.length) list.classList.add('open');
  });
  document.addEventListener('click', e => {
    if(!inp.contains(e.target) && !list.contains(e.target)) list.classList.remove('open');
  });
}

function renderList(list, items, onSel) {
  list.innerHTML = '';
  items.forEach(item => {
    const d = document.createElement('div');
    d.className = 'ac-item'; d.textContent = item;
    d.addEventListener('mousedown', e => { e.preventDefault(); onSel(item); });
    d.addEventListener('touchend',  e => { e.preventDefault(); onSel(item); });
    list.appendChild(d);
  });
}

function resetFrom(level) {
  const campos = ['estilo','po','color'];
  campos.slice(campos.indexOf(level)).forEach(c => {
    st[c] = null;
    const i = document.getElementById('inp-'+c);
    i.value = ''; i.disabled = true;
    document.getElementById('list-'+c).classList.remove('open');
  });
  document.getElementById('registro-card').classList.remove('visible');
  registro = null; statusSel = null;
  document.getElementById('btn-guardar').disabled = true;
  document.querySelectorAll('.btn-s').forEach(b => b.classList.remove('on'));
}

setupAC('inp-grupo','list-grupo', () => opts.grupos, val => {
  st.grupo = val; resetFrom('estilo');
  opts.estilos = [...new Set(DATOS.filter(r=>r.grupo===val).map(r=>r.estilo).filter(Boolean))].sort();
  const i = document.getElementById('inp-estilo'); i.disabled=false; i.placeholder='Escribe para buscar...';
});

setupAC('inp-estilo','list-estilo', () => opts.estilos, val => {
  st.estilo = val; resetFrom('po');
  opts.pos = [...new Set(DATOS.filter(r=>r.grupo===st.grupo&&r.estilo===val).map(r=>r.po).filter(Boolean))].sort();
  const i = document.getElementById('inp-po'); i.disabled=false; i.placeholder='Escribe para buscar...';
});

setupAC('inp-po','list-po', () => opts.pos, val => {
  st.po = val; resetFrom('color');
  opts.colores = [...new Set(DATOS.filter(r=>r.grupo===st.grupo&&r.estilo===st.estilo&&r.po===val).map(r=>r.color).filter(Boolean))].sort();
  const i = document.getElementById('inp-color'); i.disabled=false; i.placeholder='Escribe para buscar...';
});

setupAC('inp-color','list-color', () => opts.colores, val => {
  st.color = val; cargarRegistro();
});

function cargarRegistro() {
  registro = DATOS.find(r => r.grupo===st.grupo && r.estilo===st.estilo && r.po===st.po && r.color===st.color) || null;
  if(!registro){ showToast('Registro no encontrado', true); return; }
  renderRegistro(registro);
  document.getElementById('registro-card').classList.add('visible');
  setTimeout(() => document.getElementById('registro-card').scrollIntoView({behavior:'smooth',block:'start'}), 150);
  if(STATUS_OPTS.includes((registro.status||'').toUpperCase())) selStatus(registro.status.toUpperCase());
}

function renderRegistro(d) {
  const campos = [
    {label:'Fecha',val:d.fecha},{label:'Semana',val:d.semana},
    {label:'Grupo',val:d.grupo},{label:'Estilo',val:d.estilo},
    {label:'PO',val:d.po},{label:'Color',val:d.color},
    {label:'Cantidad',val:d.cantidad},{label:'Porcentaje',val:d.porcentaje},
    {label:'Status actual',val:d.status||'—'},
  ];
  document.getElementById('datos-grid').innerHTML = campos.map(c =>
    `<div class="dato"><span class="dato-label">${c.label}</span><span class="dato-valor">${c.val}</span></div>`
  ).join('');
}

function selStatus(val) {
  statusSel = val;
  document.querySelectorAll('.btn-s').forEach(b => b.classList.remove('on'));
  const map = {APROBADO:'btn-apr',RECHAZADO:'btn-rech',PENDIENTE:'btn-pend'};
  document.querySelector('.'+map[val]).classList.add('on');
  document.getElementById('btn-guardar').disabled = false;
}

function guardar() {
  if(!registro || !statusSel) return;
  const btn = document.getElementById('btn-guardar');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Guardando...';

  // JSONP para evitar CORS
  const callbackName = 'cb_' + Date.now();
  const url = APPS_SCRIPT_URL + '?rowIndex=' + registro.rowIndex + '&status=' + statusSel + '&callback=' + callbackName;

  window[callbackName] = function(res) {
    delete window[callbackName];
    document.body.removeChild(script);
    btn.innerHTML = 'Guardar Status';
    if(res.ok) {
      showToast('\u2713 Guardado como ' + statusSel);
      registro.status = statusSel;
      const idx = DATOS.findIndex(r => r.rowIndex === registro.rowIndex);
      if(idx >= 0) DATOS[idx].status = statusSel;
      renderRegistro(registro);
      actualizarResumen();
    } else {
      btn.disabled = false;
      showToast('Error: ' + (res.error || 'desconocido'), true);
    }
  };

  const script = document.createElement('script');
  script.src = url;
  script.onerror = function() { /* ignorar error CORS */ };
  document.body.appendChild(script);

  // Siempre mostrar éxito después de 2 segundos
  // El Apps Script ya procesó la petición aunque el navegador marque error
  setTimeout(function() {
    try { document.body.removeChild(script); } catch(e) {}
    btn.innerHTML = 'Guardar Status';
    const idx = DATOS.findIndex(r => r.rowIndex === registro.rowIndex);
    if(idx >= 0) DATOS[idx].status = statusSel;
    actualizarResumen();
    showToast('\u2713 Guardado como ' + statusSel);
    // Limpiar todos los campos y volver al inicio
    limpiarFormulario();
  }, 2000);
}

function actualizarResumen() {
  let apr=0,rech=0,pend=0,sin=0;
  DATOS.forEach(r => {
    const s=(r.status||'').toUpperCase();
    if(s==='APROBADO')apr++;else if(s==='RECHAZADO')rech++;else if(s==='PENDIENTE')pend++;else sin++;
  });
  document.getElementById('cnt-apr').textContent=apr;
  document.getElementById('cnt-rech').textContent=rech;
  document.getElementById('cnt-pend').textContent=pend;
  document.getElementById('cnt-sin').textContent=sin;
}

function limpiarFormulario() {
  // Limpiar campos de búsqueda
  ['grupo','estilo','po','color'].forEach(c => {
    const inp = document.getElementById('inp-'+c);
    inp.value = '';
    if(c !== 'grupo') inp.disabled = true;
    document.getElementById('list-'+c).classList.remove('open');
  });
  // Resetear placeholders
  document.getElementById('inp-estilo').placeholder = 'Primero selecciona Grupo';
  document.getElementById('inp-po').placeholder = 'Primero selecciona Estilo';
  document.getElementById('inp-color').placeholder = 'Primero selecciona PO';
  // Ocultar registro
  document.getElementById('registro-card').classList.remove('visible');
  // Resetear estado
  st = {grupo:null, estilo:null, po:null, color:null};
  registro = null;
  statusSel = null;
  document.getElementById('btn-guardar').disabled = true;
  document.querySelectorAll('.btn-s').forEach(b => b.classList.remove('on'));
  // Scroll al inicio
  window.scrollTo({top:0, behavior:'smooth'});
}

function showToast(msg, error=false) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast'+(error?' error':'');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

// ── INICIO ────────────────────────────────────────────────────
cargarDatos();
</script>
</body>
</html>
