<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Avances Auditoría — LIVES</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0f172a; --surface:#1e293b; --border:#334155;
  --text:#e2e8f0; --muted:#64748b;
  --green:#2a9d8f; --red:#e63946; --yellow:#e9c46a;
}

html,body{ width:100%; overflow-x:hidden; }
body{ font-family:'Barlow',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

.header{ background:var(--surface); border-bottom:1px solid var(--border); padding:16px 20px; display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:50; }
.logo-badge{ background:var(--green); color:#fff; font-weight:700; font-size:16px; padding:6px 14px; border-radius:6px; letter-spacing:1px; flex-shrink:0; }
.header-title{ font-size:16px; font-weight:600; color:var(--muted); }

.resumen{ display:flex; gap:8px; padding:14px 16px; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
.resumen::-webkit-scrollbar{ display:none; }
.res-chip{ background:var(--surface); border-radius:10px; padding:12px 16px; text-align:center; flex-shrink:0; min-width:75px; }
.res-num{ font-size:22px; font-weight:700; }
.res-lbl{ font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-top:3px; }

.main{ padding:16px 16px 120px; max-width:800px; margin:0 auto; }

.card{ background:var(--surface); border-radius:14px; padding:22px; margin-bottom:16px; }
.card-title{ font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:1.2px; margin-bottom:18px; }

.field-grid{ display:flex; flex-direction:column; gap:18px; }
@media(min-width:640px){ .field-grid{ display:grid; grid-template-columns:1fr 1fr; gap:16px; } }

.field{ display:flex; flex-direction:column; gap:8px; }
.field label{ font-size:13px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.8px; }

.ac-wrap{ position:relative; }
.ac-input{
  background:var(--bg); border:2px solid var(--border); border-radius:12px;
  color:var(--text); font-family:'Barlow',sans-serif;
  font-size:16px; padding:15px 16px; width:100%;
  transition:border-color 0.2s; -webkit-appearance:none;
}
.ac-input:focus{ outline:none; border-color:var(--green); }
.ac-input:disabled{ opacity:0.3; cursor:not-allowed; }

.ac-list{
  position:absolute; top:calc(100% + 5px); left:0; right:0;
  background:var(--surface); border:2px solid var(--green);
  border-radius:12px; max-height:250px; overflow-y:auto;
  z-index:200; display:none;
  box-shadow:0 8px 32px rgba(0,0,0,0.6);
  -webkit-overflow-scrolling:touch;
}
.ac-list.open{ display:block; }
.ac-item{ padding:14px 16px; cursor:pointer; font-size:16px; border-bottom:1px solid #ffffff08; transition:background 0.1s; }
.ac-item:last-child{ border-bottom:none; }
.ac-item:hover,.ac-item:active{ background:#2a9d8f22; color:var(--green); }

.registro-card{ background:var(--surface); border-radius:14px; padding:22px; margin-bottom:16px; border-top:4px solid var(--green); display:none; }
.registro-card.visible{ display:block; }

.datos-grid{ display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:22px; }
@media(min-width:640px){ .datos-grid{ grid-template-columns:repeat(3,1fr); } }

.dato{ display:flex; flex-direction:column; gap:4px; }
.dato-label{ font-size:11px; font-weight:700; color:#475569; text-transform:uppercase; letter-spacing:0.8px; }
.dato-valor{ font-size:16px; font-weight:600; color:var(--text); word-break:break-word; }

/* VERSUS BOX */
.versus-box{
  background:#0f172a; border-radius:10px; padding:16px 18px;
  margin-bottom:18px; display:none;
}
.versus-box.visible{ display:block; }
.versus-title{ font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:12px; }
.versus-row{ display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; }
.versus-item{ flex:1; min-width:120px; text-align:center; }
.versus-label{ font-size:11px; color:var(--muted); text-transform:uppercase; margin-bottom:4px; }
.versus-val{ font-size:22px; font-weight:700; }
.versus-sep{ font-size:22px; color:var(--muted); font-weight:300; }

/* TARJETAS DE AUDITORÍA (histórico 1ra/2da/3ra) */
.audits-box{ margin-bottom:18px; display:none; }
.audits-box.visible{ display:block; }
.audits-title{ font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; }
.audits-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
@media(max-width:480px){ .audits-grid{ grid-template-columns:1fr; } }
.audit-card{ background:#0f172a; border:1.5px solid var(--border); border-radius:10px; padding:12px; opacity:0.35; }
.audit-card.filled{ opacity:1; }
.audit-card.filled.st-aprobado{ border-color:#2a9d8f66; }
.audit-card.filled.st-rechazado{ border-color:#e6394666; }
.audit-card.filled.st-avance{ border-color:#e9c46a66; }
.audit-num{ font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:8px; }
.audit-porc{ font-size:20px; font-weight:700; margin-bottom:4px; }
.audit-cant{ font-size:11px; color:var(--text); margin-bottom:6px; }
.audit-status{ font-size:12px; font-weight:700; text-transform:uppercase; margin-bottom:4px; }
.audit-status.st-aprobado{ color:#2a9d8f; }
.audit-status.st-rechazado{ color:#e63946; }
.audit-status.st-avance{ color:#e9c46a; }
.audit-fecha{ font-size:11px; color:var(--muted); }
.audit-empty{ font-size:12px; color:var(--muted); text-align:center; padding:8px 0; }

/* CAMPO CANTIDAD AUDITADA */
.cant-field{ margin-bottom:18px; }
.cant-field label{ font-size:13px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.8px; display:block; margin-bottom:8px; }
.cant-input-wrap{ display:flex; align-items:center; gap:10px; }
.cant-input{
  background:var(--bg); border:2px solid var(--border); border-radius:12px;
  color:var(--text); font-family:'Barlow',sans-serif;
  font-size:18px; font-weight:700; padding:14px 16px;
  width:100%; transition:border-color 0.2s; -webkit-appearance:none;
  text-align:center;
}
.cant-input:focus{ outline:none; border-color:var(--green); }
.cant-hint{ font-size:12px; color:var(--muted); margin-top:6px; }
.cant-error{ font-size:12px; color:var(--red); margin-top:6px; display:none; }

.status-section{ margin-bottom:18px; }
.status-label{ font-size:13px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:12px; }
.status-btns{ display:flex; gap:10px; flex-wrap:wrap; }
.btn-s{ flex:1; min-width:90px; padding:16px 8px; border:2px solid transparent; border-radius:12px; font-family:'Barlow',sans-serif; font-size:15px; font-weight:700; cursor:pointer; transition:all 0.18s; text-transform:uppercase; -webkit-tap-highlight-color:transparent; }
.btn-apr { background:#2a9d8f22; color:#2a9d8f; border-color:#2a9d8f44; }
.btn-rech{ background:#e6394622; color:#e63946; border-color:#e6394644; }
.btn-avc { background:#e9c46a22; color:#e9c46a; border-color:#e9c46a44; }
.btn-apr:hover,.btn-apr.on  { background:#2a9d8f; color:#fff; border-color:#2a9d8f; }
.btn-rech:hover,.btn-rech.on{ background:#e63946; color:#fff; border-color:#e63946; }
.btn-avc:hover,.btn-avc.on  { background:#e9c46a; color:#0f172a; border-color:#e9c46a; }

.btn-guardar{ width:100%; padding:17px; background:var(--green); color:#fff; border:none; border-radius:12px; font-family:'Barlow',sans-serif; font-size:17px; font-weight:700; cursor:pointer; transition:background 0.2s; text-transform:uppercase; -webkit-tap-highlight-color:transparent; }
.btn-guardar:hover{ background:#21867a; }
.card-title-row{ display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }
.card-title-row .card-title{ margin-bottom:0; }
.btn-limpiar{
  background:transparent; border:1.5px solid var(--border); color:var(--muted);
  border-radius:8px; padding:6px 14px; font-family:'Barlow',sans-serif;
  font-size:12px; font-weight:700; cursor:pointer; transition:all 0.15s;
  text-transform:uppercase; letter-spacing:0.5px;
}
.btn-limpiar:hover{ border-color:var(--red); color:var(--red); }
.btn-guardar:disabled{ background:var(--border); cursor:not-allowed; color:var(--muted); }

.loading{ text-align:center; padding:40px; color:var(--muted); font-size:15px; }
.loading-dot{ display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--green); animation:pulse 1.2s ease-in-out infinite; margin:0 3px; }
.loading-dot:nth-child(2){ animation-delay:0.2s; }
.loading-dot:nth-child(3){ animation-delay:0.4s; }
@keyframes pulse{ 0%,80%,100%{ opacity:0.3; transform:scale(0.8); } 40%{ opacity:1; transform:scale(1.2); } }

.toast{ position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(120px); background:var(--green); color:#fff; padding:15px 28px; border-radius:12px; font-weight:700; font-size:15px; transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1); z-index:999; white-space:nowrap; box-shadow:0 4px 24px rgba(0,0,0,0.5); }
.toast.error{ background:var(--red); white-space:normal; max-width:90vw; text-align:center; }
.toast.show{ transform:translateX(-50%) translateY(0); }

.spinner{ display:inline-block; width:14px; height:14px; border:2px solid #ffffff44; border-top-color:#fff; border-radius:50%; animation:spin 0.6s linear infinite; vertical-align:middle; margin-right:7px; }
@keyframes spin{ to{ transform:rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <span class="logo-badge">LIVES</span>
  <span class="header-title">Avances — Auditoría</span>
</div>

<div class="resumen" id="resumen" style="display:none">
  <div class="res-chip"><div class="res-num" style="color:#94a3b8" id="cnt-tot">—</div><div class="res-lbl">Total</div></div>
  <div class="res-chip"><div class="res-num" style="color:#2a9d8f" id="cnt-apr">—</div><div class="res-lbl">Aprob.</div></div>
  <div class="res-chip"><div class="res-num" style="color:#e63946" id="cnt-rech">—</div><div class="res-lbl">Recház.</div></div>
  <div class="res-chip"><div class="res-num" style="color:#e9c46a" id="cnt-avc">—</div><div class="res-lbl">Avance</div></div>
  <div class="res-chip"><div class="res-num" style="color:#94a3b8" id="cnt-sin">—</div><div class="res-lbl">Sin status</div></div>
</div>

<div class="main">

  <div class="card">
    <div class="card-title-row">
      <div class="card-title">Buscar registro</div>
      <button class="btn-limpiar" onclick="limpiarFormulario()">✕ Limpiar</button>
    </div>
    <div id="loading-search" class="loading"><span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span><br><br>Cargando datos...</div>
    <div class="field-grid" id="field-grid" style="display:none">
      <div class="field"><label>Grupo</label><div class="ac-wrap"><input id="inp-grupo" class="ac-input" type="text" placeholder="Escribe para buscar..." autocomplete="off" autocorrect="off" autocapitalize="off"><div class="ac-list" id="list-grupo"></div></div></div>
      <div class="field"><label>Estilo</label><div class="ac-wrap"><input id="inp-estilo" class="ac-input" type="text" placeholder="Primero selecciona Grupo" autocomplete="off" autocorrect="off" autocapitalize="off" disabled><div class="ac-list" id="list-estilo"></div></div></div>
      <div class="field"><label>PO</label><div class="ac-wrap"><input id="inp-po" class="ac-input" type="text" placeholder="Primero selecciona Estilo" autocomplete="off" autocorrect="off" autocapitalize="off" disabled><div class="ac-list" id="list-po"></div></div></div>
      <div class="field"><label>Color</label><div class="ac-wrap"><input id="inp-color" class="ac-input" type="text" placeholder="Primero selecciona PO" autocomplete="off" autocorrect="off" autocapitalize="off" disabled><div class="ac-list" id="list-color"></div></div></div>
    </div>
  </div>

  <div class="registro-card" id="registro-card">
    <div class="card-title">Registro encontrado</div>
    <div class="datos-grid" id="datos-grid"></div>

    <!-- HISTORIAL DE AUDITORÍAS -->
    <div class="audits-box" id="audits-box">
      <div class="audits-title">Historial de Auditorías (por % de pedido)</div>
      <div class="audits-grid" id="audits-grid"></div>
    </div>

    <!-- CANTIDAD AUDITADA -->
    <div class="cant-field">
      <label>Cantidad Auditada</label>
      <input id="inp-cant-auditada" class="cant-input" type="number" min="0" placeholder="0" inputmode="numeric">
      <div class="cant-hint" id="cant-hint"></div>
      <div class="cant-error" id="cant-error">⚠ No puede superar la cantidad total del registro.</div>
    </div>

    <!-- VERSUS -->
    <div class="versus-box" id="versus-box">
      <div class="versus-title">% Auditado vs % Pedido</div>
      <div class="versus-row">
        <div class="versus-item">
          <div class="versus-label">% Pedido</div>
          <div class="versus-val" id="vs-pedido" style="color:var(--muted)">—</div>
        </div>
        <div class="versus-sep">vs</div>
        <div class="versus-item">
          <div class="versus-label">% Auditado</div>
          <div class="versus-val" id="vs-auditado" style="color:var(--green)">—</div>
        </div>
      </div>
    </div>

    <!-- STATUS -->
    <div class="status-section">
      <div class="status-label">Asignar Status</div>
      <div class="status-btns">
        <button class="btn-s btn-apr"  onclick="selStatus('APROBADO')">✓ Aprobado</button>
        <button class="btn-s btn-rech" onclick="selStatus('RECHAZADO')">✗ Rechazado</button>
        <button class="btn-s btn-avc"  onclick="selStatus('AVANCE')">⏩ Avance</button>
      </div>
    </div>
    <button class="btn-guardar" id="btn-guardar" onclick="guardar()" disabled>Guardar</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const SHEET_ID   = '1BT-8jGWpT6ENHgsnCBX_Ybb9rbHfUr9kearKNsvu8E4';
const SHEET_NAME = 'Avances Auditoria SEM-025';
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby-ZCzYEK9Y-N95TVjbWSMer4rxdxWoZCx8l1rhHln36QbywiCR-pIux3tyTIq8SoP3/exec';

const COL = { FECHA:0, SEMANA:1, GRUPO:2, ESTILO:3, PO:4, COLOR:5, CANT:6, PORC:7, ESTATUS_ENC:8, STATUS:9,
  P1RA:10, C1RA:11, S1RA:12, F1RA:13,
  P2DA:14, C2DA:15, S2DA:16, F2DA:17,
  P3RA:18, C3RA:19, S3RA:20, F3RA:21 };
const STATUS_OPTS = ['APROBADO','RECHAZADO','AVANCE'];

let DATOS = [];
let st = {grupo:null,estilo:null,po:null,color:null};
let registro = null, statusSel = null;
let opts = {grupos:[],estilos:[],pos:[],colores:[]};

function fmtFecha(raw) {
  if (!raw) return '';
  const m = raw.match(/^Date\((\d+),(\d+),(\d+)(?:,(\d+),(\d+),(\d+))?\)$/);
  if (!m) return raw;
  const [, y, mo, d, h, mi] = m;
  const dd = String(d).padStart(2,'0');
  const mm = String(parseInt(mo)+1).padStart(2,'0');
  let out = `${dd}/${mm}/${y}`;
  if (h !== undefined) out += ` ${String(h).padStart(2,'0')}:${String(mi).padStart(2,'0')}`;
  return out;
}

function latestAudit(d) {
  if (d.aud3_porc !== null && d.aud3_porc !== undefined) return {n:3, porc:d.aud3_porc, cant:d.aud3_cant, fecha:d.aud3_fecha};
  if (d.aud2_porc !== null && d.aud2_porc !== undefined) return {n:2, porc:d.aud2_porc, cant:d.aud2_cant, fecha:d.aud2_fecha};
  if (d.aud1_porc !== null && d.aud1_porc !== undefined) return {n:1, porc:d.aud1_porc, cant:d.aud1_cant, fecha:d.aud1_fecha};
  return null;
}

async function cargarDatos() {
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
    const res  = await fetch(url);
    const text = await res.text();
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);/)[1]);
    const rows = json.table.rows;

    DATOS = rows.map((row, i) => {
      const c = row.c;
      const val = (idx) => (c[idx] && c[idx].v !== null && c[idx].v !== undefined) ? String(c[idx].v).trim() : '';
      const fval = (idx) => fmtFecha(val(idx));
      return {
        rowIndex:   i + 2,
        fecha:      fval(COL.FECHA),
        semana:     val(COL.SEMANA),
        grupo:      val(COL.GRUPO),
        estilo:     val(COL.ESTILO),
        po:         val(COL.PO),
        color:      val(COL.COLOR),
        cantidad:   val(COL.CANT),
        porcentaje: (c[COL.PORC] && c[COL.PORC].v !== null) ? (parseFloat(c[COL.PORC].v) * 100).toFixed(2) + '%' : '',
        estatusEnc: val(COL.ESTATUS_ENC),
        status:     val(COL.STATUS),
        aud1_porc:  (c[COL.P1RA] && c[COL.P1RA].v !== null) ? parseFloat(c[COL.P1RA].v) : null,
        aud1_cant:  val(COL.C1RA),
        aud1_stat:  val(COL.S1RA),
        aud1_fecha: fval(COL.F1RA),
        aud2_porc:  (c[COL.P2DA] && c[COL.P2DA].v !== null) ? parseFloat(c[COL.P2DA].v) : null,
        aud2_cant:  val(COL.C2DA),
        aud2_stat:  val(COL.S2DA),
        aud2_fecha: fval(COL.F2DA),
        aud3_porc:  (c[COL.P3RA] && c[COL.P3RA].v !== null) ? parseFloat(c[COL.P3RA].v) : null,
        aud3_cant:  val(COL.C3RA),
        aud3_stat:  val(COL.S3RA),
        aud3_fecha: fval(COL.F3RA),
      };
    }).filter(r => r.grupo || r.estilo);

    document.getElementById('loading-search').style.display = 'none';
    document.getElementById('field-grid').style.display = '';

    actualizarResumen();
    opts.grupos = [...new Set(DATOS.map(r=>r.grupo).filter(Boolean))].sort();

  } catch(e) {
    document.getElementById('loading-search').innerHTML = '⚠ Error cargando datos. Verifica que el Sheets sea público.';
    console.error(e);
  }
}

function setupAC(inpId, listId, getOpts, onSel) {
  const inp  = document.getElementById(inpId);
  const list = document.getElementById(listId);
  inp.addEventListener('input', () => {
    const q = inp.value.toLowerCase();
    const f = getOpts().filter(o => o.toLowerCase().includes(q));
    renderList(list, f, val => { inp.value=val; list.classList.remove('open'); onSel(val); });
    list.classList.toggle('open', f.length > 0 && inp.value !== '');
  });
  inp.addEventListener('focus', () => {
    const o = getOpts(); if(!o.length) return;
    const q = inp.value.toLowerCase();
    const f = q ? o.filter(x => x.toLowerCase().includes(q)) : o;
    renderList(list, f, val => { inp.value=val; list.classList.remove('open'); onSel(val); });
    if(f.length) list.classList.add('open');
  });
  document.addEventListener('click', e => {
    if(!inp.contains(e.target) && !list.contains(e.target)) list.classList.remove('open');
  });
}

function renderList(list, items, onSel) {
  list.innerHTML = '';
  items.forEach(item => {
    const d = document.createElement('div');
    d.className = 'ac-item'; d.textContent = item;
    d.addEventListener('mousedown', e => { e.preventDefault(); onSel(item); });
    let tStartY = 0, tStartX = 0, didScroll = false;
    d.addEventListener('touchstart', e => { tStartY = e.touches[0].clientY; tStartX = e.touches[0].clientX; didScroll = false; }, {passive:true});
    d.addEventListener('touchmove', e => { if(Math.abs(e.touches[0].clientY-tStartY)>5||Math.abs(e.touches[0].clientX-tStartX)>5) didScroll=true; }, {passive:true});
    d.addEventListener('touchend', e => { if(!didScroll){ e.preventDefault(); onSel(item); } });
    list.appendChild(d);
  });
}

function resetFrom(level) {
  const campos = ['estilo','po','color'];
  campos.slice(campos.indexOf(level)).forEach(c => {
    st[c] = null;
    const i = document.getElementById('inp-'+c);
    i.value = ''; i.disabled = true;
    document.getElementById('list-'+c).classList.remove('open');
  });
  document.getElementById('registro-card').classList.remove('visible');
  registro = null; statusSel = null;
  document.getElementById('btn-guardar').disabled = true;
  document.querySelectorAll('.btn-s').forEach(b => b.classList.remove('on'));
}

setupAC('inp-grupo','list-grupo', () => opts.grupos, val => {
  st.grupo = val; resetFrom('estilo');
  opts.estilos = [...new Set(DATOS.filter(r=>r.grupo===val).map(r=>r.estilo).filter(Boolean))].sort();
  const i = document.getElementById('inp-estilo'); i.disabled=false; i.placeholder='Escribe para buscar...';
});
setupAC('inp-estilo','list-estilo', () => opts.estilos, val => {
  st.estilo = val; resetFrom('po');
  opts.pos = [...new Set(DATOS.filter(r=>r.grupo===st.grupo&&r.estilo===val).map(r=>r.po).filter(Boolean))].sort();
  const i = document.getElementById('inp-po'); i.disabled=false; i.placeholder='Escribe para buscar...';
});
setupAC('inp-po','list-po', () => opts.pos, val => {
  st.po = val; resetFrom('color');
  opts.colores = [...new Set(DATOS.filter(r=>r.grupo===st.grupo&&r.estilo===st.estilo&&r.po===val).map(r=>r.color).filter(Boolean))].sort();
  const i = document.getElementById('inp-color'); i.disabled=false; i.placeholder='Escribe para buscar...';
});
setupAC('inp-color','list-color', () => opts.colores, val => { st.color = val; cargarRegistro(); });

function cargarRegistro() {
  registro = DATOS.find(r => r.grupo===st.grupo && r.estilo===st.estilo && r.po===st.po && r.color===st.color) || null;
  if(!registro){ showToast('Registro no encontrado', true); return; }
  renderRegistro(registro);
  document.getElementById('registro-card').classList.add('visible');
  // Prellenar cantidad auditada si ya tiene
  const cantInp = document.getElementById('inp-cant-auditada');
  const ultimaAud = latestAudit(registro);
  cantInp.value = ultimaAud ? (ultimaAud.cant || '') : '';
  cantInp.max = parseFloat(registro.cantidad) || 999999;
  document.getElementById('cant-hint').textContent = `Máximo: ${registro.cantidad} prendas`;
  actualizarVersus();
  renderAudits(registro);
  setTimeout(() => document.getElementById('registro-card').scrollIntoView({behavior:'smooth',block:'start'}), 150);
  if(STATUS_OPTS.includes((registro.status||'').toUpperCase())) selStatus(registro.status.toUpperCase());
}

function renderAudits(d) {
  const box = document.getElementById('audits-box');
  const grid = document.getElementById('audits-grid');
  const cantTot = parseFloat(d.cantidad) || 0;
  const audits = [
    {num:'1ra Auditoría', porc:d.aud1_porc, cant:d.aud1_cant, stat:d.aud1_stat, fecha:d.aud1_fecha},
    {num:'2da Auditoría', porc:d.aud2_porc, cant:d.aud2_cant, stat:d.aud2_stat, fecha:d.aud2_fecha},
    {num:'3ra Auditoría', porc:d.aud3_porc, cant:d.aud3_cant, stat:d.aud3_stat, fecha:d.aud3_fecha},
  ];
  const hayAlguna = audits.some(a => a.porc !== null && a.porc !== undefined);
  if(!hayAlguna) { box.classList.remove('visible'); return; }
  box.classList.add('visible');

  grid.innerHTML = audits.map(a => {
    if(a.porc === null || a.porc === undefined) {
      return `<div class="audit-card"><div class="audit-num">${a.num}</div><div class="audit-empty">Sin registrar</div></div>`;
    }
    const statClass = 'st-' + (a.stat||'').toLowerCase();
    const porcPedidoTxt = (a.porc*100).toFixed(2) + '%';
    const cantAud = parseFloat(a.cant) || 0;
    let auditadoTxt = '—';
    if(cantAud > 0 && cantTot > 0) {
      const porcReal = (cantAud / cantTot) * (a.porc*100);
      auditadoTxt = porcReal.toFixed(2) + '% (' + cantAud + ' prendas)';
    }
    return `<div class="audit-card filled ${statClass}">
      <div class="audit-num">${a.num}</div>
      <div class="audit-porc">${porcPedidoTxt}</div>
      <div class="audit-cant">Auditado: ${auditadoTxt}</div>
      <div class="audit-status ${statClass}">${a.stat||'—'}</div>
      <div class="audit-fecha">${a.fecha||''}</div>
    </div>`;
  }).join('');
}

// Actualizar versus en tiempo real al cambiar cantidad auditada
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('inp-cant-auditada').addEventListener('input', actualizarVersus);
});

function actualizarVersus() {
  if(!registro) return;
  const cantInp  = document.getElementById('inp-cant-auditada');
  const cantAud  = parseFloat(cantInp.value) || 0;
  const cantTot  = parseFloat(registro.cantidad) || 0;
  // porcentaje ya viene formateado como "104.44%", extraer número
  const porcPed  = parseFloat((registro.porcentaje||'0').replace('%','')) || 0;
  const errorEl  = document.getElementById('cant-error');
  const versusBox = document.getElementById('versus-box');

  // Validar máximo
  if(cantAud > cantTot && cantTot > 0) {
    errorEl.style.display = 'block';
    cantInp.style.borderColor = 'var(--red)';
  } else {
    errorEl.style.display = 'none';
    cantInp.style.borderColor = cantAud > 0 ? 'var(--green)' : 'var(--border)';
  }

  if(cantAud > 0 && cantTot > 0) {
    const porcAud = (cantAud / cantTot) * porcPed;
    document.getElementById('vs-pedido').textContent  = porcPed.toFixed(2) + '%';
    document.getElementById('vs-auditado').textContent = porcAud.toFixed(2) + '%';
    versusBox.classList.add('visible');
  } else {
    versusBox.classList.remove('visible');
  }
}

function renderRegistro(d) {
  const ultima = latestAudit(d);
  const cantTot = parseFloat(d.cantidad) || 0;
  let cantAudTxt = '—', porcAudTxt = '—';
  if (ultima) {
    const cantAud = parseFloat(ultima.cant) || 0;
    cantAudTxt = cantAud > 0 ? cantAud + ' prendas' : '—';
    if (cantAud > 0 && cantTot > 0) {
      const porcReal = (cantAud / cantTot) * (ultima.porc * 100);
      porcAudTxt = porcReal.toFixed(2) + '%';
    }
  }
  const campos = [
    {label:'Fecha',val:d.fecha},{label:'Semana',val:d.semana},
    {label:'Grupo',val:d.grupo},{label:'Estilo',val:d.estilo},
    {label:'PO',val:d.po},{label:'Color',val:d.color},
    {label:'Cantidad',val:d.cantidad},{label:'% Pedido',val:d.porcentaje},
    {label:'Estatus Encajado',val:d.estatusEnc||'—'},
    {label:'Status actual',val:d.status||'—'},
    {label:'Cant. Auditada (últ.)',val:cantAudTxt},{label:'% Auditado (últ.)',val:porcAudTxt},
  ];
  document.getElementById('datos-grid').innerHTML = campos.map(c =>
    `<div class="dato"><span class="dato-label">${c.label}</span><span class="dato-valor">${c.val}</span></div>`
  ).join('');
}

function selStatus(val) {
  statusSel = val;
  document.querySelectorAll('.btn-s').forEach(b => b.classList.remove('on'));
  const map = {APROBADO:'btn-apr',RECHAZADO:'btn-rech',AVANCE:'btn-avc'};
  document.querySelector('.'+map[val]).classList.add('on');
  document.getElementById('btn-guardar').disabled = false;
}

function guardar() {
  if(!registro || !statusSel) return;

  // Validar cantidad auditada
  const cantInp = document.getElementById('inp-cant-auditada');
  const cantAud = parseFloat(cantInp.value) || 0;
  const cantTot = parseFloat(registro.cantidad) || 0;
  if(cantAud > cantTot && cantTot > 0) {
    showToast('La cantidad auditada supera el total del registro', true);
    return;
  }

  const btn = document.getElementById('btn-guardar');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Guardando...';

  const callbackName = 'cb_' + Date.now();

  // FIX: ahora se manda también grupo/estilo/po/color para que el Apps
  // Script pueda verificar (y autocorregir si hace falta) que el rowIndex
  // realmente corresponda a este registro. Antes, si el rowIndex quedaba
  // desactualizado por una inserción/borrado de filas mientras la página
  // estaba abierta, el guardado caía en una fila equivocada sin avisar.
  let params = `?rowIndex=${registro.rowIndex}&status=${statusSel}&callback=${callbackName}`
    + `&grupo=${encodeURIComponent(st.grupo || '')}`
    + `&estilo=${encodeURIComponent(st.estilo || '')}`
    + `&po=${encodeURIComponent(st.po || '')}`
    + `&color=${encodeURIComponent(st.color || '')}`;
  if(cantAud > 0) params += `&cantAud=${cantAud}`;

  const url = APPS_SCRIPT_URL + params;

  let respondido = false;

  window[callbackName] = function(res) {
    respondido = true;
    delete window[callbackName];
    try { document.body.removeChild(script); } catch(e) {}
    btn.innerHTML = 'Guardar';
    btn.disabled = false;

    // FIX: antes esto se ignoraba y siempre se mostraba "guardado" a los
    // 2 segundos, incluso si el servidor devolvía un error. Ahora sí se
    // revisa la respuesta real.
    if (res && res.ok) {
      const idx = DATOS.findIndex(r => r.rowIndex === registro.rowIndex);
      if(idx >= 0) {
        DATOS[idx].status = statusSel;
      }
      actualizarResumen();
      showToast('✓ Guardado correctamente');
      limpiarFormulario();
    } else {
      showToast((res && res.error) ? res.error : 'No se pudo guardar. Verifica el registro e inténtalo de nuevo.', true);
      btn.disabled = false;
    }
  };

  const script = document.createElement('script');
  script.src = url;
  script.onerror = function() {
    if (respondido) return;
    respondido = true;
    delete window[callbackName];
    try { document.body.removeChild(script); } catch(e) {}
    btn.innerHTML = 'Guardar';
    btn.disabled = false;
    showToast('Error de conexión al guardar. Verifica tu internet e inténtalo de nuevo.', true);
  };
  document.body.appendChild(script);

  // FIX: este timeout ya NO asume éxito. Solo actúa como red de seguridad
  // si nunca llegó respuesta del servidor (por ejemplo, JSONP bloqueado),
  // y en ese caso avisa del problema en vez de fingir que se guardó.
  setTimeout(function() {
    if (respondido) return;
    respondido = true;
    delete window[callbackName];
    try { document.body.removeChild(script); } catch(e) {}
    btn.innerHTML = 'Guardar';
    btn.disabled = false;
    showToast('No se recibió confirmación del servidor. Verifica e inténtalo de nuevo antes de continuar.', true);
  }, 8000);
}

function actualizarResumen() {
  let apr=0,rech=0,avc=0,sin=0;
  DATOS.forEach(r => {
    const s=(r.status||'').toUpperCase();
    if(s==='APROBADO')apr++;
    else if(s==='RECHAZADO')rech++;
    else if(s==='AVANCE')avc++;
    else sin++;
  });
  document.getElementById('cnt-tot').textContent  = DATOS.length;
  document.getElementById('cnt-apr').textContent  = apr;
  document.getElementById('cnt-rech').textContent = rech;
  document.getElementById('cnt-avc').textContent  = avc;
  document.getElementById('cnt-sin').textContent  = sin;
  const el = document.getElementById('resumen');
  if(el) el.style.display = 'flex';
}

function limpiarFormulario() {
  ['grupo','estilo','po','color'].forEach(c => {
    const inp = document.getElementById('inp-'+c);
    inp.value = '';
    if(c !== 'grupo') inp.disabled = true;
    document.getElementById('list-'+c).classList.remove('open');
  });
  document.getElementById('inp-estilo').placeholder = 'Primero selecciona Grupo';
  document.getElementById('inp-po').placeholder = 'Primero selecciona Estilo';
  document.getElementById('inp-color').placeholder = 'Primero selecciona PO';
  document.getElementById('inp-cant-auditada').value = '';
  document.getElementById('cant-hint').textContent = '';
  document.getElementById('cant-error').style.display = 'none';
  document.getElementById('versus-box').classList.remove('visible');
  document.getElementById('audits-box').classList.remove('visible');
  document.getElementById('registro-card').classList.remove('visible');
  st = {grupo:null, estilo:null, po:null, color:null};
  registro = null; statusSel = null;
  document.getElementById('btn-guardar').disabled = true;
  document.querySelectorAll('.btn-s').forEach(b => b.classList.remove('on'));
  window.scrollTo({top:0, behavior:'smooth'});
}

function showToast(msg, error=false) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast'+(error?' error':'');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), error ? 6000 : 3500);
}

cargarDatos();
</script>
